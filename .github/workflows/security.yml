name: security

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    # Rollout phase: ship with continue-on-error: true so the 3-day false-positive
    # cleanup window does not block merges. Flip to false after the cleanup
    # (see docs/devex/branch-protection.md "Rollout phases").
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep CE
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/javascript
            p/owasp-top-ten
            p/security-audit

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Rollout phase: same rationale as semgrep — allow 3-day allowlist
    # tuning window before enforcing. Flip to false after cleanup
    # (see docs/devex/branch-protection.md "Rollout phases").
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
