name: security

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Semgrep CE
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/typescript
            p/javascript
            p/owasp-top-ten
            p/security-audit

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose

  deps-audit:
    name: deps-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      - name: Check security-exception label
        id: exception
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'security-exception') }}" == "true" ]]; then
            echo "granted=true" >> "$GITHUB_OUTPUT"
            echo "::warning::deps-audit bypassed — PR carries the 'security-exception' label. Exception must be justified in the PR description."
          else
            echo "granted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Audit dependencies
        if: steps.exception.outputs.granted == 'false'
        run: |
          if pnpm audit --prod --audit-level high; then
            exit 0
          fi
          echo ""
          echo "::error::High/Critical vulnerabilities found. Fix: upgrade the affected dependency, or add the 'security-exception' label to this PR (admin only). Exceptions are reviewed in the next monthly security sweep."
          exit 1

  actions-pinning:
    name: actions-pinning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify actions are pinned to a commit SHA
        run: |
          # Supply-chain hardening: every `uses:` must reference a 40-char commit
          # SHA, never a mutable tag (@v1, @v2.3). A tag can be silently repointed
          # by the action author; an immutable SHA cannot. Policy and bump process:
          # docs/devex/action-pinning.md.
          if matches=$(grep -rEn 'uses: .+@v[0-9]+' .github/workflows/); then
            echo "::error::Unpinned GitHub Action reference(s) found — pin to a 40-char commit SHA (keep the '# vX' comment). See docs/devex/action-pinning.md."
            echo "$matches"
            exit 1
          fi
          echo "All workflow actions are pinned to a commit SHA."
