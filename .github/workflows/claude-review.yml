name: claude-review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  # Monthly hard-cap for AI review cost (NFR-002, fail-closed). Conservative
  # guardrail — normal usage (a few cents per PR) stays far below this. Adjust
  # here; rationale and the override path are documented in docs/devex/ai-review.md.
  CLAUDE_MONTHLY_BUDGET_USD: '80'

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    steps:
      - name: Check skip label
        id: skip
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'skip-claude-review') }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude review skipped — PR carries the 'skip-claude-review' label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve budget month
        if: steps.skip.outputs.skip == 'false'
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      # Ledger persists the running monthly spend across PR runs via the Actions
      # cache (no protected-branch push — see docs/devex/ai-review.md). The key is
      # rolling: restore the latest entry for the month by prefix, save a unique
      # entry per run. Cache entries are immutable, so a fixed monthly key could
      # never accumulate.
      - name: Restore cost ledger
        if: steps.skip.outputs.skip == 'false'
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/claude-cost-ledger.json
          key: claude-cost-ledger-${{ steps.month.outputs.month }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            claude-cost-ledger-${{ steps.month.outputs.month }}-

      - name: Budget gate
        if: steps.skip.outputs.skip == 'false'
        id: budget
        run: |
          node scripts/check-review-budget.mjs gate \
            --budget "$CLAUDE_MONTHLY_BUDGET_USD" \
            --ledger "$RUNNER_TEMP/claude-cost-ledger.json" \
            --has-override "${{ contains(github.event.pull_request.labels.*.name, 'claude-cost-high') }}" \
            --month "${{ steps.month.outputs.month }}"

      - name: Notify budget exceeded
        if: steps.skip.outputs.skip == 'false' && steps.budget.outputs.should_cancel == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          MONTH_TOTAL: ${{ steps.budget.outputs.month_total }}
          BUDGET: ${{ steps.budget.outputs.budget }}
        run: |
          BODY=$(printf '%s\n\n%s\n\n%s\n' \
            "⚠️ **Claude review skipped — monthly AI-review budget reached.**" \
            "This month's estimated AI-review spend (\$$MONTH_TOTAL) has reached the configured budget (\$$BUDGET), so the advisory review was not run (NFR-002, fail-closed)." \
            "To run it anyway on this PR, add the \`claude-cost-high\` label and re-trigger — comment \`@claude review\` or re-run the workflow. See \`docs/devex/ai-review.md\`.")
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          echo "::notice::Claude review cancelled — monthly budget reached (\$$MONTH_TOTAL of \$$BUDGET). Add 'claude-cost-high' to override."

      - name: Claude review
        if: steps.skip.outputs.skip == 'false' && steps.budget.outputs.should_cancel == 'false'
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an advisory PR reviewer for dm-forge. You do not gate
            merge — Constitution principle 6 (determinism over
            sophistication) reserves blocking behavior for deterministic
            checks. Your output is guidance for human reviewers.

            Source of truth — apply this hierarchy when judgments conflict
            (higher items constrain lower; the Constitution always wins):
              1. `.ai/constitution.md`              (non-negotiable principles)
              2. `.ai/engineering.md`               (stack, structure, standards)
              3. `docs/adr/*.md`                    (architectural decisions)
              4. `docs/*.md` matching the PR scope  (pick via the "When to
                                                     dive deeper" table in
                                                     `engineering.md`)
              5. Tech Design / Spec linked from the PR description
              6. Existing code patterns

            Load `.ai/constitution.md` and `.ai/engineering.md` first,
            then only the `docs/*.md` files relevant to the diff. Never
            invent rules — every principle citation must quote a real
            source by name.

            If the diff only touches docs or lockfiles and nothing under
            `apps/**`, `packages/**`, or `tests/**`, post a brief
            "no relevant code changes" note and stop.

            Focus, in order:
            1. Correctness, bugs, edge cases.
            2. Conformance with the Constitution and engineering rules —
               name the principle or rule when flagging a violation
               (e.g. "Constitution principle 7 — Lazy infrastructure").
            3. Security and privacy (no BYOK keys, prompts, or campaign
               content in logs; typed errors; row-level auth on campaign
               entities).
            4. Test coverage for new behavior (mandatory per
               `engineering.md`).

            How to comment:
            - Anchor every finding to a specific file and line via
              `mcp__github_inline_comment__create_inline_comment`.
            - Stay silent on principles the PR does not violate — do not
              comment just to acknowledge a rule was followed.
            - Skip stylistic nits already enforced by Biome
              (`pnpm lint`, `pnpm format`).

            Consolidated top-level comment via `gh pr comment`:
            - First line is a verdict, one of:
                `Verdict: REQUEST CHANGES — <N> blocker(s)`,
                `Verdict: COMMENT — <N> suggestion(s)`,
                `Verdict: APPROVE — no findings`.
              This is advisory text — do not submit a formal GitHub
              Review.
            - Follow with a short bullet summary referencing the inline
              comments. Do not repeat their bodies.

            Only post GitHub comments — never reply as chat messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      # Add this run's cost to the month's ledger even if the review step failed
      # (the cost is incurred regardless). Missing execution_file -> records 0.
      - name: Record review cost
        if: ${{ !cancelled() && steps.skip.outputs.skip == 'false' && steps.budget.outputs.should_cancel == 'false' }}
        run: |
          node scripts/check-review-budget.mjs record \
            --budget "$CLAUDE_MONTHLY_BUDGET_USD" \
            --ledger "$RUNNER_TEMP/claude-cost-ledger.json" \
            --execution-file "${{ steps.review.outputs.execution_file }}" \
            --month "${{ steps.month.outputs.month }}"

      - name: Save cost ledger
        if: ${{ !cancelled() && steps.skip.outputs.skip == 'false' && steps.budget.outputs.should_cancel == 'false' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/claude-cost-ledger.json
          key: claude-cost-ledger-${{ steps.month.outputs.month }}-${{ github.run_id }}-${{ github.run_attempt }}
