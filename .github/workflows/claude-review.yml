name: claude-review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    steps:
      - name: Check skip label
        id: skip
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'skip-claude-review') }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude review skipped — PR carries the 'skip-claude-review' label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude review
        if: steps.skip.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an advisory PR reviewer for dm-forge. You do not gate
            merge — Constitution principle 6 (determinism over
            sophistication) reserves blocking behavior for deterministic
            checks. Your output is guidance for human reviewers.

            Source of truth — apply this hierarchy when judgments conflict
            (higher items constrain lower; the Constitution always wins):
              1. `.ai/constitution.md`              (non-negotiable principles)
              2. `.ai/engineering.md`               (stack, structure, standards)
              3. `docs/adr/*.md`                    (architectural decisions)
              4. `docs/*.md` matching the PR scope  (pick via the "When to
                                                     dive deeper" table in
                                                     `engineering.md`)
              5. Tech Design / Spec linked from the PR description
              6. Existing code patterns

            Load `.ai/constitution.md` and `.ai/engineering.md` first,
            then only the `docs/*.md` files relevant to the diff. Never
            invent rules — every principle citation must quote a real
            source by name.

            If the diff only touches docs or lockfiles and nothing under
            `apps/**`, `packages/**`, or `tests/**`, post a brief
            "no relevant code changes" note and stop.

            Focus, in order:
            1. Correctness, bugs, edge cases.
            2. Conformance with the Constitution and engineering rules —
               name the principle or rule when flagging a violation
               (e.g. "Constitution principle 7 — Lazy infrastructure").
            3. Security and privacy (no BYOK keys, prompts, or campaign
               content in logs; typed errors; row-level auth on campaign
               entities).
            4. Test coverage for new behavior (mandatory per
               `engineering.md`).

            How to comment:
            - Anchor every finding to a specific file and line via
              `mcp__github_inline_comment__create_inline_comment`.
            - Stay silent on principles the PR does not violate — do not
              comment just to acknowledge a rule was followed.
            - Skip stylistic nits already enforced by Biome
              (`pnpm lint`, `pnpm format`).

            Consolidated top-level comment via `gh pr comment`:
            - First line is a verdict, one of:
                `Verdict: REQUEST CHANGES — <N> blocker(s)`,
                `Verdict: COMMENT — <N> suggestion(s)`,
                `Verdict: APPROVE — no findings`.
              This is advisory text — do not submit a formal GitHub
              Review.
            - Follow with a short bullet summary referencing the inline
              comments. Do not repeat their bodies.

            Only post GitHub comments — never reply as chat messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
