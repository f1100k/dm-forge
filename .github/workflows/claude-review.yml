name: claude-review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    steps:
      - name: Check skip label
        id: skip
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'skip-claude-review') }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude review skipped — PR carries the 'skip-claude-review' label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Claude review
        if: steps.skip.outputs.skip == 'false'
        uses: anthropics/claude-code-action@ebedabde12fe903f2423b77c9303fcb603fd3aa3 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Anchor the judgment on `.ai/constitution.md`
            and `.ai/engineering.md` (load both first). Complement with any
            `docs/*.md` files relevant to the PR scope per the "When to dive
            deeper" table at the bottom of `engineering.md`.

            Focus on:
            - Correctness, bugs, edge cases
            - Conformance with the Constitution and engineering rules
            - Security and privacy (no BYOK keys, prompts, or content in logs;
              typed errors; row-level auth on campaign entities)
            - Test coverage for new behavior (mandatory per `engineering.md`)

            If the diff only touches docs or lockfiles and nothing under
            `apps/**`, `packages/**`, or `tests/**`, respond with a brief
            "no relevant code changes" note and stop.

            Use `gh pr comment` for the consolidated top-level review.
            Use `mcp__github_inline_comment__create_inline_comment` for inline
            findings. Only post GitHub comments — do not submit review text as
            chat messages.

          claude_args: |
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
