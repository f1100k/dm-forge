packages:
  - "apps/*"
  - "packages/*"
  - "tests"

# Single source of truth for versions of dependencies used in >1 workspace.
# Reference them with "catalog:" in each package.json — pnpm resolves to the
# version pinned here. Adding a new shared dep? Pin it here first, then point
# every package.json at "catalog:". Single-use deps stay local to their package.
catalog:
  # Toolchain (devDeps)
  typescript: ^6.0.3
  vitest: ^4.1.0
  tsx: ^4.22.4
  "@types/node": ^22.10.5
  # Plugin used by both apps/web and the root vitest workspace (unit:web /
  # integration:web projects). Catalog the version so they cannot drift.
  "@vitejs/plugin-react": ^6.0.2

  # Validation + types
  zod: ^4.4.3
  zod-prisma-types: ^3.2.4

  # Database
  prisma: ^7.8.0
  "@prisma/client": ^7.8.0

  # Auth
  better-auth: ^1.6.13

  # tRPC (the 11.0.0-rc.660 line co-versions server + client + react-query)
  "@trpc/server": ^11.0.0-rc.660
  "@trpc/client": ^11.0.0-rc.660
  "@trpc/react-query": ^11.0.0-rc.660

  # Env loading (used by packages/shared and previously root)
  dotenv: ^17.4.2
  dotenv-expand: ^13.0.0

  # Test helpers (owned by the new @dm-forge/tests package)
  "@testcontainers/postgresql": ^12.0.1
  testcontainers: ^12.0.1
  "@faker-js/faker": ^10.4.0
  msw: ^2.14.6
  happy-dom: ^20.8.9
  "@testing-library/react": ^16.1.0
