services:
  postgres:
    image: postgres:16-alpine
    container_name: dm-forge-postgres
    restart: unless-stopped
    # Compose loads the root `.env` automatically. These variables live in
    # a single place — changing the password there is reflected in both the
    # database and DATABASE_URL (the latter is assembled via dotenv-expand).
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dm-forge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dm-forge-postgres-data:
