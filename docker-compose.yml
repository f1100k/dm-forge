services:
  postgres:
    image: postgres:16-alpine
    container_name: dm-forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dmforge
      POSTGRES_PASSWORD: dmforge
      POSTGRES_DB: dmforge
    ports:
      - "5432:5432"
    volumes:
      - dm-forge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmforge -d dmforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dm-forge-postgres-data:
